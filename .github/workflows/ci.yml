name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # Pin to the requires-python floor (3.11, needed for tomllib) so CI proves
      # the declared minimum works instead of relying on the runner default.
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run hermetic CLI E2E
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m pytest tests/test_cli_e2e.py -q -p no:cacheprovider

      - name: Run tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m pytest -q -p no:cacheprovider